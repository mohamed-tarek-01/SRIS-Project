services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./laravel_app:/var/www
      - ./php-overrides.ini:/usr/local/etc/php/conf.d/99-overrides.ini
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "80:80"
      - "8000:80"
    volumes:
      - ./laravel_app:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - app_network

  ml_service:
    build:
      context: ./ml_service
    container_name: ml_service
    working_dir: /app
    volumes:
      - ./ml_service:/app
    ports:
      - "8001:8000"
    networks:
      - app_network

  db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sris_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    networks:
      - app_network
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: adminer_gui
    restart: always
    ports:
      - "8080:8080"
    networks:
      - app_network
    depends_on:
      - db

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
